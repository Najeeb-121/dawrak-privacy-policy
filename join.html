<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Join Dawrak</title></head>
<body>
<script>
  var id = new URLSearchParams(window.location.search).get('id');
  if (id) {
    window.location.href = 'dawrak://join/' + id;
  }
  setTimeout(function () {
    var ua = navigator.userAgent.toLowerCase();
    if (/android/.test(ua)) {
      window.location.href = 'https://play.google.com/store/apps/details?id=com.dawrak.app';
    } else if (/iphone|ipad|ipod/.test(ua)) {
      window.location.href = 'https://apps.apple.com/app/idYOUR_APP_ID';
    } else {
      document.body.innerHTML = '<p>Please download the Dawrak app to join this association.</p>';
    }
  }, 2500);
</script>
<p>Opening Dawrak app...</p>
</body>
</html>
